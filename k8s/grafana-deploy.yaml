apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: zobs-services
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: data
          mountPath: /var/lib/grafana
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: zobs-services
spec:
  selector: { app: grafana }
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  type: ClusterIP
