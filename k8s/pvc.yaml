apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: zobs-services
spec:
  accessModes: [ "ReadWriteOnce" ]
  resources: { requests: { storage: 5Gi } }
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: zobs-services
spec:
  accessModes: [ "ReadWriteOnce" ]
  resources: { requests: { storage: 10Gi } }
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
